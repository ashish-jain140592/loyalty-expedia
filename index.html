<title>Loyalty Segment — Insurance Experience Personalization · Expedia InsurTech</title>
<style>
  /* ── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:        #0062CC;
    --blue-lt:     #EBF4FF;
    --blue-dk:     #004799;
    --text:        #0C0E1C;
    --gray:        #67687D;
    --border:      #DFE0E4;
    --bg:          #F4F6FA;
    --white:       #FFFFFF;
    --star:        #F59E0B;
    --green:       #00A15E;
    --red:         #B91C1C;
    --plat:        #475569;
    --plat-bg:     #F1F5F9;
    --phone-shell: #121212;
    --radius-card: 16px;
    --shadow:      0 8px 32px rgba(0,0,0,.12);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ── Top header ──────────────────────────────────────────── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--blue);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; font-weight: 800;
  }
  .logo-text { font-size: 15px; font-weight: 700; color: var(--text); }
  .logo-sub  { font-size: 12px; color: var(--gray); }
  .header-badge {
    background: var(--blue-lt);
    color: var(--blue);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid #BDD9FF;
  }

  /* ── Main layout ─────────────────────────────────────────── */
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 1fr;
    gap: 0;
    max-width: 960px;
    margin: 0 auto;
    width: 100%;
    padding: 32px 24px;
    align-items: start;
  }

  /* ── Left panel — screen info ────────────────────────────── */
  .panel-left {
    padding-right: 24px;
    position: sticky;
    top: 92px;
  }
  .step-counter {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--gray);
    margin-bottom: 6px;
  }
  .screen-title {
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
    margin-bottom: 10px;
  }
  .screen-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 18px;
  }
  .badge-standard    { background: #F1F5F9; color: var(--plat); border: 1px solid #CBD5E1; }
  .badge-loyalty     { background: #FEF3C7; color: #92400E; border: 1px solid #FDE68A; }
  .badge-recovery    { background: #FEF2F2; color: var(--red); border: 1px solid #FECACA; }

  .annotation {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 16px;
    font-size: 13px;
    line-height: 1.6;
    color: var(--gray);
  }
  .annotation strong { color: var(--text); }
  .annotation ul { padding-left: 16px; margin-top: 8px; }
  .annotation li { margin-bottom: 4px; }
  .annotation .tag {
    display: inline-block;
    background: var(--blue-lt);
    color: var(--blue);
    font-size: 10px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 4px;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: .05em;
  }
  .annotation .tag-green { background: #DCFCE7; color: #166534; }
  .annotation .tag-red   { background: #FEF2F2; color: var(--red); }
  .annotation .tag-amber { background: #FEF3C7; color: #92400E; }

  /* ── Center — phone + navigation ────────────────────────── */
  .center {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .nav-row {
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .nav-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
    box-shadow: 0 2px 8px rgba(0,0,0,.06);
  }
  .nav-btn:hover:not(:disabled) {
    border-color: var(--blue);
    color: var(--blue);
    box-shadow: 0 2px 12px rgba(0,98,204,.15);
  }
  .nav-btn:disabled { opacity: .3; cursor: default; }

  /* ── Phone mockup ────────────────────────────────────────── */
  .phone-wrap {
    position: relative;
    width: 310px;
    flex-shrink: 0;
  }
  .phone-shell {
    background: var(--phone-shell);
    border-radius: 42px;
    padding: 14px;
    box-shadow: 0 24px 64px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08) inset;
    position: relative;
  }
  .phone-screen {
    border-radius: 30px;
    overflow: hidden;
    position: relative;
    background: #fff;
    line-height: 0;
  }
  .phone-screen img {
    width: 100%;
    height: auto;
    display: block;
    transition: opacity .2s;
  }
  .phone-screen img.fade-out { opacity: 0; }
  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 76px; height: 24px;
    background: var(--phone-shell);
    border-radius: 12px;
    z-index: 10;
    pointer-events: none;
  }
  /* Side buttons */
  .btn-power {
    position: absolute;
    right: -4px; top: 120px;
    width: 4px; height: 68px;
    background: #333;
    border-radius: 0 3px 3px 0;
  }
  .btn-vol-up {
    position: absolute;
    left: -4px; top: 100px;
    width: 4px; height: 44px;
    background: #333;
    border-radius: 3px 0 0 3px;
  }
  .btn-vol-dn {
    position: absolute;
    left: -4px; top: 156px;
    width: 4px; height: 44px;
    background: #333;
    border-radius: 3px 0 0 3px;
  }

  /* ── Progress dots ───────────────────────────────────────── */
  .progress {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--border);
    cursor: pointer;
    transition: all .2s;
  }
  .dot.active {
    background: var(--blue);
    width: 24px;
    border-radius: 4px;
  }
  .dot:hover:not(.active) { background: #BDD9FF; }

  /* Right panel removed */

  /* ── Footer strip ────────────────────────────────────────── */
  footer {
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 14px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .footer-note {
    font-size: 11px;
    color: var(--gray);
  }
  .footer-note a { color: var(--blue); text-decoration: none; font-weight: 600; }
  .kbd {
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px;
    font-size: 11px; color: var(--text); font-family: monospace;
  }

  /* ── Hotspots ────────────────────────────────────────────── */
  #hotspotLayer {
    position: absolute; inset: 0;
    pointer-events: none; z-index: 5;
  }
  .hotspot {
    position: absolute;
    background: transparent;
    cursor: pointer;
    border-radius: 4px;
    pointer-events: all;
    transition: background .12s;
  }
  .hotspot:hover { background: rgba(0,98,204,.10); }

  /* ── Sub-screen thumbnails ───────────────────────────────── */
  .thumb-item.sub-screen { background: #f0f4ff; }
  .thumb-sub-label {
    font-size: 9px; font-weight: 700; color: var(--blue);
    text-transform: uppercase; letter-spacing: .04em;
    margin-top: 2px;
  }

  /* ── Mobile: phone only, centred, nothing else ───────────── */
  @media (max-width: 768px) {
    header, footer, .panel-left { display: none; }
    body { background: #111; flex-direction: row; align-items: center; justify-content: center; min-height: 100vh; }
    main { flex: none; display: flex; align-items: center; justify-content: center; padding: 0; max-width: none; width: 100%; }
    .center { gap: 0; }
    .nav-btn, .progress { display: none; }
    .phone-wrap { width: min(310px, calc(100vw - 32px)); }
  }
</style>

// Render a screen
function go(idx) {
  if (idx < 0 || idx >= SCREENS.length) return;

  var REVIEW_SCREENS = [0, 8, 10, 31];

  // Any "Price details" link → show dynamic modal, never navigate to static PNGs
  // Indices: 11=base, 13=no-seat, 16=one-seat, 17=both-seats, 20=bags, 23=prot, 24=prot-added, 26=price-drop
  if ([11, 13, 16, 17, 20, 23, 24, 26].indexOf(idx) !== -1) {
    showPriceDetails();
    return;
  }

  // Toggle hotspot (target:25) tapped while on a review screen
  // → flip overlay in-place, don't navigate away
  if (idx === 25 && REVIEW_SCREENS.indexOf(current) !== -1) {
    priceDropOn = !priceDropOn;
    renderPriceDropOverlay();
    return;
  }

  // "Close" on the price-details-review screen (26) → return to last review screen
  if (idx === 25 && current === 26) { idx = lastReviewScreen; }

  // Flight list: redirect to Korean Air-selected variant when KA is already selected
  if (idx === 7 && lastReviewScreen === 31) { idx = 32; }
  if (idx === 9 && lastReviewScreen === 31) { idx = 33; }

  // Confirmation: show Korean Air version when KA was selected
  if (idx === 28 && lastReviewScreen === 31) { idx = 34; }

  // Back from seats (1) or original flight lists (7, 9) always returns to last review screen
  // (preserves flight change: e.g. stays on Korean Air review instead of resetting to screen 0)
  // Note: screens 32/33 (KA-selected variants) use direct targets, no redirect needed
  if (idx === 0 && (current === 1 || current === 7 || current === 9)) { idx = lastReviewScreen; }

  // Track which review screen is currently displayed
  if (REVIEW_SCREENS.indexOf(idx) !== -1) {
    lastReviewScreen = idx;
    reviewBase = (idx === 0) ? 3200 : 2950;
  }

  // Track bag state (19 = BOS bag added, 22 = ICN bag added; back unsets)
  if (idx === 19 || idx === 22) { bagsAdded = true; }
  if (idx === 2  && current === 19) { bagsAdded = false; }
  if (idx === 21 && current === 22) { bagsAdded = false; }

  // Track protection state (4 = checked, back to 3 = unchecked)
  if (idx === 4) { protectionAdded = true; }
  if (idx === 3 && current === 4) { protectionAdded = false; }

  current = idx;
  var s = SCREENS[idx];

  // Fade transition
  img.classList.add('fade-out');
  setTimeout(function() {
    img.src = s.file;
    img.classList.remove('fade-out');
  }, 150);

  // Hotspots
  renderHotspots(s);

  // Interactive seat overlay (replaces static per-seat navigation)
  if (SEAT_SCREEN_MAP[idx] !== undefined) {
    renderSeatOverlay(SEAT_SCREEN_MAP[idx]);
  }

  // Price drop overlay — re-render on review screens, clear everywhere else
  if (REVIEW_SCREENS.indexOf(idx) !== -1 && priceDropOn) {
    renderPriceDropOverlay();
  } else {
    var pdOld = document.getElementById('priceDropOverlay');
    if (pdOld) pdOld.remove();
  }

  // Bags footer overlay — correct trip total on all bag screens
  if ([2, 19, 21, 22].indexOf(idx) !== -1) { renderBagsFooterOverlay(); }

  // Protection footer overlay — correct trip total on protection screens
  if ([3, 4].indexOf(idx) !== -1) { renderProtectionFooterOverlay(); }

  // Left panel
  var mainIdx = 0;
  for (var p = 0; p <= idx; p++) { if (!SCREENS[p].subScreen) mainIdx++; }
  stepCtr.textContent = s.subScreen ? 'Interaction screen' : ('Step ' + mainIdx + ' of 6');
  titleEl.textContent = s.title;
  badgeEl.textContent = s.badge + (s.star ? ' \u2605' : '');
  badgeEl.className = 'screen-badge ' + s.bClass;

  // Annotation
  var bulletHtml = '';
  for (var j = 0; j < s.bullets.length; j++) {
    bulletHtml += '<li>' + s.bullets[j] + '</li>';
  }
  annotEl.innerHTML =
    '<span class="tag ' + s.tagClass + '">' + s.tag + '</span>' +
    '<p>' + s.body + '</p>' +
    '<ul>' + bulletHtml + '</ul>';

  // Buttons — respect custom prevIdx/nextIdx
  var prevI = (s.prevIdx !== undefined) ? s.prevIdx : idx - 1;
  var nextI = (s.nextIdx !== undefined) ? s.nextIdx : idx + 1;
  btnPrev.disabled = (prevI === null || prevI < 0);
  btnNext.disabled = (nextI === null || nextI >= SCREENS.length);

  // Dots (only main flow)
  var dotEls = document.querySelectorAll('.dot');
  var di = 0;
  for (var k = 0; k < SCREENS.length; k++) {
    if (SCREENS[k].subScreen) continue;
    if (k === idx) { dotEls[di].classList.add('active'); }
    else           { dotEls[di].classList.remove('active'); }
    di++;
  }

  // Thumbnails
  var thumbs = document.querySelectorAll('.thumb-item');
  for (var m = 0; m < thumbs.length; m++) {
    if (m === idx) { thumbs[m].classList.add('active'); }
    else           { thumbs[m].classList.remove('active'); }
  }

  // Thumbnail highlight only — no scroll so focus stays on the phone
}

// Nav buttons — respect custom navigation
btnPrev.addEventListener('click', function() {
  var s = SCREENS[current];
  var prevI = (s.prevIdx !== undefined) ? s.prevIdx : current - 1;
  if (prevI !== null && prevI >= 0) go(prevI);
});
btnNext.addEventListener('click', function() {
  var s = SCREENS[current];
  var nextI = (s.nextIdx !== undefined) ? s.nextIdx : current + 1;
  if (nextI !== null && nextI < SCREENS.length) go(nextI);
});

// Keyboard nav
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight') {
    var s = SCREENS[current];
    var nextI = (s.nextIdx !== undefined) ? s.nextIdx : current + 1;
    if (nextI !== null) go(nextI);
  }
  if (e.key === 'ArrowLeft') {
    var s2 = SCREENS[current];
    var prevI = (s2.prevIdx !== undefined) ? s2.prevIdx : current - 1;
    if (prevI !== null) go(prevI);
  }
});

// Init
go(0);
</script>
</body>
</html>
